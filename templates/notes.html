{% extends "base.html" %}

{% block content %}
<h3>Your Notes</h3>

<form method="POST" class="d-flex mb-3">
    <input class="form-control me-2" type="text" name="content" placeholder="Write note" required>
    <button class="btn btn-primary">Add</button>
</form>

<ul class="list-group">
{% for note in notes %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ note.content }}
        <a href="/delete/{{ note.id }}" class="btn btn-danger btn-sm">Delete</a>
    </li>
{% endfor %}
</ul>

<br>
<a class="btn btn-secondary" href="/dashboard">Back</a>
{% endblock %}
